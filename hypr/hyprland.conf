autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

source = ~/.config/hypr/monitors.conf
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=desc:Xiaomi Corporation Mi Monitor 5744900053006, 2560x1440@180, 0x0,1 
monitor=eDP-1, 1920x1080@60, -2560x0, 1
monitor=desc:VE228, 1920x1080@60, 2560x0, 1, transform,1 


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty 
$fileManager = dolphin
$menu = wofi --show drun
$browser = flatpak run app.zen_browser.zen

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
#exec-once = nm-applet &
exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = home
exec-once = blueman-applet
exec-once = syncthing
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = kbuildsycoca6



# Initialize and auto-unlock KWallet on launch
exec-once = /usr/lib/pam_kwallet_init


# forcing system backend to apply cstom theme choices
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

#############################
### ENVIRONMENT VARIABLES ###
#############################



env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Tells QT apps (like Dolphin) to use KDE/Qt settings
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,kde
# Tells GTK apps to prefer dark mode
env = GTK_THEME,Breeze-Dark
ENV = XDG_MENU_PREFIX,arch-


#env = QT_QPA_PLATFORMTHEME,qt5ct

