general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session & sleep 1 
    after_sleep_cmd = sleep 3 && hyprctl dispatch dpms on
}

# Lock the screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off the display after 7 minutes of inactivity
listener {
    timeout = 420
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend the system after 10 minutes of inactivity
listener {
    timeout = 600
    on-timeout = sh -c 'if cat /sys/class/power_supply/BAT*/status 2>/dev/null | grep -q "Discharging"; then systemctl suspend; else pidof hyprlock || omarchy-launch-screensaver; fi'
}
